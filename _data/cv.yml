        end_date: 1998
        highlights:
          - "Major advisor: James H. Brown."

      - institution: University of New Mexico
        location: Albuquerque, New Mexico, USA
        area: Biology (Ecology Program)
        studyType: MS
        start_date: 1991
        end_date: 1994

      - institution: Colorado College
